        <script>
            // postMessage broker for inline edit screenshot capture.
            // Forwards capture requests from the parent (Perplexity page) to the
            // inner iframe (sandbox app) and relays the result back. The inner
            // iframe needs a responder script (injected by ASI) to handle the
            // INLINE_EDIT_CAPTURE_REQUEST message and send back the screenshot.
            const inner = document.getElementById('inner');
            window.addEventListener('message', function(e) {
                if (e.data && e.data.type === 'INLINE_EDIT_CAPTURE_REQUEST' && e.source === window.parent && inner && inner.contentWindow) {
                    inner.contentWindow.postMessage(e.data, '*');
                }
                if (e.data && e.data.type === 'INLINE_EDIT_SCREENSHOT_RESULT' && inner && e.source === inner.contentWindow) {
                    window.parent.postMessage(e.data, '*');
                }
            });
        </script>
